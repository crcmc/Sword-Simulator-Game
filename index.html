<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSG — Sword Simulator Game</title>
<link rel="stylesheet" href="shared.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    z-index: 2;
  }
  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 36px;
    color: var(--accent);
    text-shadow: 4px 4px 0 #000, 0 0 24px rgba(255,215,0,0.4);
    margin-bottom: 12px;
    letter-spacing: 4px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .domain {
    font-family: 'Press Start 2P', monospace;
    color: var(--teal);
    font-size: 11px;
    margin-bottom: 40px;
    opacity: 0.7;
  }
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 18px;
    width: 100%;
    max-width: 880px;
  }
  .game-card {
    background: linear-gradient(180deg, var(--panel) 0%, #0a0716 100%);
    border: 3px solid var(--panel-border);
    padding: 22px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05),
                0 0 0 3px var(--bg-dark),
                0 4px 20px rgba(74, 56, 112, 0.4);
  }
  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: inset 0 0 0 1px rgba(255,215,0,0.2),
                0 0 0 3px var(--bg-dark),
                0 8px 30px rgba(255, 215, 0, 0.25);
  }
  .game-card:hover .game-icon { transform: scale(1.1); }
  .game-icon {
    font-size: 48px;
    margin-bottom: 12px;
    transition: transform 0.2s;
    text-align: center;
  }
  .game-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 2px;
  }
  .game-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
  }
  .game-tag {
    display: inline-block;
    margin-top: 12px;
    padding: 3px 10px;
    background: rgba(94, 234, 212, 0.1);
    border: 1px solid var(--teal);
    color: var(--teal);
    font-size: 10px;
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 1px;
  }
  .browser-notice {
    margin-top: 28px;
    max-width: 720px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    padding: 12px 18px;
    background: rgba(94, 234, 212, 0.06);
    border: 1px dashed rgba(94, 234, 212, 0.4);
  }
  .browser-notice strong {
    color: var(--teal);
    letter-spacing: 0.5px;
  }
  .browser-notice .icon { margin-right: 6px; }
  .browser-notice .sub {
    display: block;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.8;
  }

  .footer-note {
    margin-top: 24px;
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
    opacity: 0.5;
  }
  .pixel-deco {
    position: absolute;
    pointer-events: none;
    opacity: 0.15;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="logo">SSG</div>
    <div class="subtitle">Sword Simulator Game</div>

    <div class="game-grid">
      <a href="sword-enhancement.html" class="game-card">
        <div class="game-icon">⚔️</div>
        <div class="game-title">검 강화</div>
        <div class="game-desc">대장간에서 검을 두드려 전설 속 +30강에 도전하세요.</div>
        <div style="text-align:center"><span class="game-tag">FORGE</span></div>
      </a>

      <a href="sword-rental.html" class="game-card">
        <div class="game-icon">🛡️</div>
        <div class="game-title">검 대여소</div>
        <div class="game-desc">용사들에게 검을 대여해 던전 속 강화 재료를 구하세요.</div>
        <div style="text-align:center"><span class="game-tag">RENTAL</span></div>
      </a>

      <a href="sword-dungeon.html" class="game-card">
        <div class="game-icon">🏰</div>
        <div class="game-title">던전</div>
        <div class="game-desc">보스를 격파하려면, 강력한 검과 용사가 필요합니다.</div>
        <div style="text-align:center"><span class="game-tag">DUNGEON</span></div>
      </a>
    </div>

    <div class="browser-notice">
      <span class="icon">💡</span>
      모바일에서는 <strong>Chrome 브라우저</strong> 사용을 권장합니다.
      <span class="sub">iOS Safari는 7일 이상 미접속 시 저장 데이터가 자동 삭제될 수 있어요. 데스크톱은 어느 브라우저든 무관합니다.</span>
    </div>

    <div class="footer-note">
      Sword Simulator · 검 강화 시뮬레이터 · 2026
    </div>
  </div>
</body>
</html>
