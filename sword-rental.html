<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>검 대여소 - Sword Rental</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0716">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SSG">
<link rel="stylesheet" href="shared.css">
<style>
  .rental-wrap {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
    align-items: start;
  }
  @media (max-width: 1080px) {
    .rental-wrap { grid-template-columns: 1fr; }
  }
  .rental-col { display: flex; flex-direction: column; }

  /* Collection grid */
  .rental-collection {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .rental-collection .col-cell { aspect-ratio: 0.9; }
  .rental-collection .col-cell.empty {
    background: rgba(0,0,0,0.2);
    border: 2px dashed #2a2040;
    color: var(--text-dim);
    cursor: default;
    font-size: 10px;
    padding: 8px;
    text-align: center;
    align-items: center;
    justify-content: center;
    grid-column: span 3;
  }

  /* Sword/Hero preview split */
  .preview-split {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .preview-half {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 2px solid var(--panel-border);
    padding: 8px;
    text-align: center;
    min-height: 145px;
    display: flex;
    flex-direction: column;
  }
  .preview-half.has-sword { border-top-color: var(--accent); }
  .preview-half.has-hero { border-top-color: var(--success); }
  .preview-half .preview-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .preview-half .preview-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 11px;
  }
  .preview-half .preview-empty {
    color: var(--text-dim);
    font-style: italic;
    font-size: 10px;
  }
  .preview-half .preview-name {
    font-family: 'Pretendard', monospace;
    color: var(--accent);
    font-size: 12px;
    margin-top: 2px;
  }
  .preview-half .preview-meta {
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Dungeon target box */
  .dungeon-target {
    background: rgba(0,0,0,0.4);
    border: 2px solid var(--panel-border);
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 11px;
  }
  .dungeon-target.empty {
    color: var(--text-dim);
    text-align: center;
    font-style: italic;
  }
  .dungeon-target .dt-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
  }
  .dungeon-target .dt-row .label { color: var(--text-dim); }
  .dungeon-target .dt-row .v {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--accent);
  }
  .dungeon-target .dt-row .v.success { color: var(--success); }
  .dungeon-target .dt-row .v.fail { color: var(--fail); }
  .dungeon-target .dt-row .v.warn { color: var(--warn); }

  /* Applicant cards */
  .applicant-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 380px;
    overflow-y: auto;
  }
  .applicant-card {
    background: rgba(0,0,0,0.3);
    border: 2px solid var(--panel-border);
    border-bottom-width: 4px;
    padding: 7px 10px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    align-items: center;
    font-size: 11px;
    transition: all 0.1s;
  }
  .applicant-card .view-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--text-dim);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 9px;
    padding: 4px 8px;
    cursor: pointer;
    letter-spacing: 0.5px;
    line-height: 1.1;
    white-space: nowrap;
    transition: all 0.1s;
  }
  .applicant-card .view-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,215,0,0.1);
  }
  .applicant-card:hover {
    background: rgba(0,0,0,0.5);
    transform: translateY(-1px);
  }
  .applicant-card.selected {
    border-color: var(--success);
    background: rgba(74, 222, 128, 0.08);
  }
  .applicant-card .name {
    font-family: 'Pretendard', monospace;
    color: var(--accent);
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .applicant-card .greedy {
    color: var(--warn);
    font-size: 10px;
    margin-left: 4px;
  }
  .tier-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 3px 6px;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .tier-badge[data-tier="0"] { background: rgba(205,213,224,0.15); color: #cdd5e0; border: 1px solid #cdd5e0; }
  .tier-badge[data-tier="1"] { background: rgba(155,212,255,0.15); color: #9bd4ff; border: 1px solid #9bd4ff; }
  .tier-badge[data-tier="2"] { background: rgba(77,109,255,0.15); color: #4d6dff; border: 1px solid #4d6dff; }
  .tier-badge[data-tier="3"] { background: rgba(192,96,255,0.15); color: #c060ff; border: 1px solid #c060ff; }
  .tier-badge[data-tier="4"] { background: rgba(255,80,96,0.15); color: #ff5060; border: 1px solid #ff5060; }
  .tier-badge[data-tier="5"] { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid #ffd700; }
  .applicant-card .pay {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--success);
  }
  .applicant-empty {
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
    padding: 16px 8px;
    font-style: italic;
  }

  /* Applicant detail modal */
  .applicant-modal {
    max-width: 480px;
    width: 90%;
    text-align: left;
    /* Long content scroll: title sticky on top, modal-actions sticky on bottom,
       body in the middle scrolls. Cap at 90vh so it never overflows viewport. */
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    padding: 0;            /* override shared .modal { padding: 24px } */
    overflow: hidden;      /* hide any rounded-corner bleed */
  }
  .applicant-modal h3 {
    text-align: center;
    font-size: 14px;
    margin: 0;
    padding: 14px 22px 10px;
    border-bottom: 1px dashed var(--panel-border);
    flex: 0 0 auto;
  }
  .applicant-modal #applicant-modal-body {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;  /* iOS momentum scroll */
    overscroll-behavior: contain;
    padding: 10px 20px 14px;
    flex: 1 1 auto;
    min-height: 0;          /* required for flex child to actually scroll */
  }
  .applicant-modal > .modal-actions {
    padding: 10px 20px 14px;
    border-top: 1px dashed var(--panel-border);
    flex: 0 0 auto;
    margin: 0;
    background: var(--panel);
  }
  .applicant-modal .hero-portrait {
    text-align: center;
    margin-bottom: 12px;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border: 2px solid var(--panel-border);
  }
  .applicant-modal .hero-portrait .hp-name {
    font-family: 'Pretendard', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .applicant-modal .hero-portrait .hp-tier {
    margin-top: 6px;
    display: inline-block;
  }
  .applicant-modal .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin: 12px 0;
  }
  .applicant-modal .stat-cell {
    background: rgba(0,0,0,0.3);
    padding: 8px 4px;
    text-align: center;
    border: 1px solid #2a2040;
  }
  .applicant-modal .stat-cell .label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .applicant-modal .stat-cell .v {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-top: 4px;
  }
  .applicant-modal .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: rgba(0,0,0,0.25);
    margin: 4px 0;
    font-size: 11px;
  }
  .applicant-modal .info-row .k { color: var(--text-dim); }
  .applicant-modal .info-row .v {
    font-family: 'Pretendard', monospace;
    color: var(--text);
  }
  .applicant-modal .motivation {
    background: rgba(192,96,255,0.1);
    border-left: 3px solid #c060ff;
    padding: 8px 12px;
    font-style: italic;
    color: var(--text);
    margin: 12px 0;
    font-size: 11px;
  }
  .applicant-modal .summary {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--panel-border);
    padding: 8px 12px;
    margin: 12px 0 8px;
    font-size: 11px;
    line-height: 1.6;
  }
  .applicant-modal .summary .key { color: var(--text-dim); }
  .applicant-modal .summary .pos { color: var(--success); }
  .applicant-modal .summary .neg { color: var(--fail); }
  .applicant-modal .summary .warn { color: var(--warn); }

  .applicant-modal .floor-selector {
    margin: 10px 0 6px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--panel-border);
    font-size: 11px;
  }
  .applicant-modal .floor-selector .key { color: var(--text-dim); }
  .applicant-modal .floor-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .applicant-modal .floor-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 5px 11px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .applicant-modal .floor-btn:hover { border-color: var(--accent); color: var(--accent); }
  .applicant-modal .floor-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .applicant-modal .dungeon-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 5px 11px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .applicant-modal .dungeon-btn .tag {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .applicant-modal .dungeon-btn:hover:not([disabled]) { border-color: var(--accent); }
  .applicant-modal .dungeon-btn.active {
    background: rgba(255,215,0,0.12);
    border-color: var(--accent);
    font-weight: 600;
  }
  .applicant-modal .dungeon-btn.active .tag { color: var(--accent); }
  .applicant-modal .dungeon-btn[disabled],
  .applicant-modal .dungeon-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Active rental rows */
  .rental-list { display: flex; flex-direction: column; gap: 6px; max-height: 480px; overflow-y: auto; }
  .rental-row {
    background: rgba(0,0,0,0.3);
    border: 2px solid var(--panel-border);
    padding: 8px 10px;
    font-size: 11px;
    position: relative;
  }
  .rental-row.dead {
    border-color: var(--fail);
    background: rgba(239,68,68,0.05);
  }
  .rental-row .top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .rental-row .hero {
    color: var(--accent);
    font-family: 'Pretendard', monospace;
    font-size: 12px;
  }
  .rental-row .badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 2px 5px;
    background: rgba(255,215,0,0.15);
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .rental-row.dead .badge {
    background: rgba(239,68,68,0.15);
    border-color: var(--fail);
    color: var(--fail);
  }
  .rental-row .info {
    color: var(--text-dim);
    font-size: 10px;
    line-height: 1.5;
  }
  .rental-row .progress-bar {
    height: 8px;
    background: #000;
    border: 1px solid #333;
    margin-top: 6px;
    overflow: hidden;
  }
  .rental-row .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success) 0%, var(--accent) 100%);
    transition: width 0.5s linear;
  }
  .rental-row .countdown {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--info);
    margin-top: 4px;
    text-align: right;
  }
  .empty-msg {
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
    padding: 16px 8px;
    font-style: italic;
  }
  .stats-summary {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--panel-border);
    padding: 8px 12px;
    margin-bottom: 12px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    color: var(--text-dim);
  }
  .stats-summary .v {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--accent);
  }
</style>
</head>

<script>
const $ = id => document.getElementById(id);

let selectedSwordLevel = -1;
let selectedApplicantId = null;
let pendingApplicantId = null;
let pendingFloor = 1; // floor selected in applicant modal
let pendingDungeonTier = null; // dungeon tier selected in applicant modal (null = use applicant's desired)

// "1층", "지하 1층", "지하 2층" 식 표기
function floorLabel(n) {
  return n <= 1 ? '1층' : `지하 ${n - 1}층`;
}

function selectedApplicant() {
  if (!selectedApplicantId) return null;
  return (state.applicants || []).find(a => a.id === selectedApplicantId);
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  $('nav-forge').textContent = forge ? forge.name : '—';
  $('nav-gold').textContent = (state.gold || 0).toLocaleString();
  $('nav-active').textContent = (state.rentals || []).length;

  // Resolve once and pass through to both consumers — guarantees that
  // 선택된 용사 패널과 dungeon-target 메시지가 같은 applicant 인스턴스를
  // 본다. (이전에는 각자 selectedApplicant()를 따로 호출해서 두 결과가
  // 어긋날 여지가 있었음.)
  const sel = selectedApplicant();

  renderCollection();
  renderPreviewSword();
  renderApplicants();
  renderPreviewHero(sel);
  renderDungeonTarget(sel);
  renderActiveRentals();
  renderDeadSwords();

  $('stat-rentals-started').textContent = state.stats.rentalsStarted || 0;
  $('stat-rentals-succeeded').textContent = state.stats.rentalsSucceeded || 0;
  $('stat-rentals-failed').textContent = state.stats.rentalsFailed || 0;
}

function renderCollection() {
  const grid = $('rental-collection');
  let html = '';
  let totalCount = 0;
  for (let lvl = 1; lvl <= 30; lvl++) {
    const count = state.collection[lvl] || 0;
    if (count === 0) continue;
    totalCount += count;
    const isUnlocked = !!state.unlocked[lvl];
    const svg = buildSwordSVG(lvl, { silhouette: !isUnlocked, width: 60 });
    const sel = (lvl === selectedSwordLevel) ? ' selected' : '';
    html += `

function renderDungeonTarget(a) {

    box.innerHTML = '대여 신청자 목록에서 용사를 선택하세요';
    return;
  }
  // Defensive: applicant fields may be partially missing if the schema drifted.
  // Catch any error and surface it instead of silently leaving the previous
  // empty-state HTML in place.
  try {
    box.classList.remove('empty');
    const tier = a.desiredDungeonTier;
    const cfg = balance.dungeons && balance.dungeons[tier];
    if (!cfg) throw new Error('던전 설정 없음 (tier=' + tier + ')');
    const dur = adjustedDuration(selectedSwordLevel, tier, a.tier);
    const rate = adjustedSuccessRate(selectedSwordLevel, tier, a.tier);
    const reward = dungeonRewards(tier, 1);
    const heroCut = Math.floor(reward.gold * a.payRate / 100);
    const playerGold = reward.gold - heroCut;
    const swordGap = getTier(selectedSwordLevel) - tier;
    const heroGap = a.tier - tier;
    let gapNotes = [];
    if (swordGap !== 0) gapNotes.push(`검 ${swordGap > 0 ? '+' : ''}${swordGap}티어`);
    if (heroGap !== 0) gapNotes.push(`용사 ${heroGap > 0 ? '+' : ''}${heroGap}티어`);
    const gapTxt = gapNotes.length ? `(${gapNotes.join(', ')})` : '';
    const rateColor = rate >= 70 ? 'success' : rate >= 30 ? 'warn' : 'fail';
    box.innerHTML = `
      <div class="dt-row"><span class="label">희망 던전</span><span class="v" style="color:${TIER_COLORS[tier]}">${cfg.name} (티어 ${tier}) ${a.greedy ? '🎯' : ''}</span></div>
      <div class="dt-row"><span class="label">던전 성공률 ${gapTxt}</span><span class="v ${rateColor}">${rate}%</span></div>
      <div class="dt-row"><span class="label">공략 소요 시간</span><span class="v">${formatDuration(dur)}</span></div>
      <div class="dt-row"><span class="label">예상 보수 (성공 시)</span><span class="v">+${playerGold.toLocaleString()} G + ${reward.resource} ${balance.resourceNames[tier]}</span></div>
      <div class="dt-row"><span class="label">용사 보수 (${a.payRate}%)</span><span class="v warn">−${heroCut.toLocaleString()} G</span></div>
    `;
  } catch (e) {
    console.warn('renderDungeonTarget failed:', e, 'applicant:', a);
    box.classList.add('empty');
    box.innerHTML = '⚠️ 출정 정보 표시 실패: ' + (e.message || e);
  }
}

function selectSword(level) {

  playSound('click');

function showApplicantModal(applicantId) {
  const a = (state.applicants || []).find(x => x.id === applicantId);
  if (!a) return;
  pendingApplicantId = applicantId;
  selectedApplicantId = applicantId; // also update center display
  // Default selected dungeon = applicant's desired tier, but if (defensively)
  // that dungeon is locked, fall back to highest unlocked tier ≤ desired.
  // After the floor-1 default-unlock migration this branch should never trigger,
  // but it provides a safety net for any future regression.
  let defaultTier = a.desiredDungeonTier;
  const desiredProg = (state.dungeonProgress && state.dungeonProgress[defaultTier]) || { unlocked: false };
  if (!desiredProg.unlocked) {
    for (let t = defaultTier - 1; t >= 0; t--) {
      const tp = (state.dungeonProgress && state.dungeonProgress[t]) || { unlocked: t === 0 };
      if (tp.unlocked) { defaultTier = t; break; }
    }
    if (defaultTier === a.desiredDungeonTier) defaultTier = 0; // last-resort
  }
  pendingDungeonTier = defaultTier;
  // Default selected floor = highest unlocked challenge (bestFloor + 1) for that dungeon
  const prog = (state.dungeonProgress && state.dungeonProgress[pendingDungeonTier]) || { bestFloor: 0 };
  pendingFloor = (prog.bestFloor || 0) + 1;
  renderApplicantModalContent();
  $('applicant-modal-bg').classList.add('show');
  render();
}

function renderApplicantModalContent() {
  if (!pendingApplicantId) return;
  const a = (state.applicants || []).find(x => x.id === pendingApplicantId);
  if (!a) return;

  // Use selected dungeon tier (default = applicant's desired). Players can pick
  // any unlocked dungeon ≤ desiredDungeonTier (downgrade-only, no upgrade).
  if (pendingDungeonTier == null) pendingDungeonTier = a.desiredDungeonTier;
  if (pendingDungeonTier > a.desiredDungeonTier) pendingDungeonTier = a.desiredDungeonTier;
  if (pendingDungeonTier < 0) pendingDungeonTier = 0;
  const tier = pendingDungeonTier;
  const tierColor = TIER_COLORS[a.tier];
  const dungeon = balance.dungeons[tier];
  const prog = (state.dungeonProgress && state.dungeonProgress[tier]) || { bestFloor: 0, unlocked: tier === 0 };
  const maxAvailableFloor = (prog.bestFloor || 0) + 1;
  // Clamp pendingFloor in case progression changed since modal opened
  if (pendingFloor < 1) pendingFloor = 1;
  if (pendingFloor > maxAvailableFloor) pendingFloor = maxAvailableFloor;

  const dur = adjustedDuration(selectedSwordLevel, tier, a.tier, pendingFloor);
  const rate = adjustedSuccessRate(selectedSwordLevel, tier, a.tier);
  const reward = dungeonRewards(tier, pendingFloor);
  const heroCut = Math.floor(reward.gold * a.payRate / 100);
  const playerGold = reward.gold - heroCut;

  // Dungeon buttons (T0 ~ a.desiredDungeonTier). Locked dungeons are disabled.
  // Default desired tier marked as "★ 희망", lower tiers as "↓ 하향".
  let dungeonButtons = '';
  for (let t = 0; t <= a.desiredDungeonTier; t++) {
    const dCfg = balance.dungeons[t];
    const dProg = (state.dungeonProgress && state.dungeonProgress[t]) || { unlocked: t === 0 };
    const unlocked = !!dProg.unlocked;
    const isActive = t === pendingDungeonTier;
    const cls = (isActive ? 'active ' : '') + (unlocked ? '' : 'disabled');
    const tag = (t === a.desiredDungeonTier) ? '★ 희망' : '↓ 하향';
    const lockMark = unlocked ? '' : '🔒 ';
    const dColor = TIER_COLORS[t];
    const disabledAttr = unlocked ? '' : 'disabled';
    dungeonButtons += `<button class="dungeon-btn ${cls}" data-dungeon-tier="${t}" type="button" ${disabledAttr} title="티어 ${t}"><span style="color:${dColor}">${lockMark}${dCfg.name}</span> <span class="tag">${tag}</span></button>`;
  }

  // Floor buttons (1 ~ maxAvailableFloor). Cleared = ✓, challenge = ★.
  let floorButtons = '';
  for (let f = 1; f <= maxAvailableFloor; f++) {
    const cls = f === pendingFloor ? 'active' : '';
    const tag = (f <= (prog.bestFloor || 0)) ? '✓' : '★';
    floorButtons += `<button class="floor-btn ${cls}" data-floor="${f}" type="button">${tag} ${floorLabel(f)}</button>`;
  }

  const downgradeNote = (tier < a.desiredDungeonTier)
    ? `<div class="key" style="color:var(--text-dim); font-size:10px; margin-top:6px;">※ 희망 던전(${balance.dungeons[a.desiredDungeonTier].name})보다 ${a.desiredDungeonTier - tier}티어 낮은 던전으로 파견합니다.</div>`
    : '';

  let summary = `<div class="key">선택 검:</div> <strong>+${selectedSwordLevel} ${SWORD_NAMES[selectedSwordLevel]}</strong> (티어 ${getTier(selectedSwordLevel)})<br>`;
  summary += `<div class="key">출정 던전:</div> <strong>${dungeon.name}</strong> (티어 ${tier})${a.greedy && tier === a.desiredDungeonTier ? ' <span class="warn">🎯 능력 이상 도전</span>' : ''}<br>`;
  summary += `<div class="key">출정 층:</div> <strong>${floorLabel(pendingFloor)}</strong><br>`;
  summary += `<div class="key">던전 성공률:</div> <span class="${rate >= 70 ? 'pos' : rate >= 30 ? 'warn' : 'neg'}">${rate}%</span><br>`;
  summary += `<div class="key">공략 소요 시간:</div> ${formatDuration(dur)}<br>`;
  summary += `<div class="key">성공 시 보수:</div> +${playerGold.toLocaleString()} G + ${reward.resource} ${balance.resourceNames[tier]} (용사 ${heroCut.toLocaleString()} G 차감)`;

  $('applicant-modal-title').textContent = `${a.name} 신청서`;
  $('applicant-modal-body').innerHTML = `
    <div class="hero-portrait">
      <div>${buildHeroSVG(-1, { size: 80, heroTier: a.tier })}</div>
      <div class="hp-name" style="color:${tierColor}">${a.name}</div>
      <div class="hp-tier"><span class="tier-badge" data-tier="${a.tier}">티어 ${a.tier}</span></div>
    </div>
    <div class="stats-grid">
      <div class="stat-cell"><div class="label">힘</div><div class="v">${a.stats.strength}</div></div>
      <div class="stat-cell"><div class="label">민첩</div><div class="v">${a.stats.agility}</div></div>
      <div class="stat-cell"><div class="label">행운</div><div class="v">${a.stats.luck}</div></div>
    </div>
    <div class="info-row"><span class="k">희망 던전</span><span class="v">${balance.dungeons[a.desiredDungeonTier].name} (티어 ${a.desiredDungeonTier})${a.greedy ? ' 🎯' : ''}</span></div>
    <div class="info-row"><span class="k">희망 보수율</span><span class="v" style="color:var(--success);">${a.payRate}%</span></div>
    <div class="motivation">"${a.motivation}"</div>
    <div class="floor-selector"><div class="key" style="margin-bottom:6px;">출정 던전 선택 (희망 ↓하향만 가능)</div><div class="floor-buttons">${dungeonButtons}</div>${downgradeNote}</div>
    <div class="floor-selector"><div class="key" style="margin-bottom:6px;">출정 층 선택 (최고 ${prog.bestFloor || 0}층 클리어)</div><div class="floor-buttons">${floorButtons}</div></div>
    <div class="summary">${summary}</div>
  `;
}

function closeApplicantModal() {
  $('applicant-modal-bg').classList.remove('show');
  pendingApplicantId = null;
}

function rejectApplicant() {
  if (!pendingApplicantId) { closeApplicantModal(); return; }
  const a = (state.applicants || []).find(x => x.id === pendingApplicantId);
  if (!a) { closeApplicantModal(); return; }
  state.applicants = (state.applicants || []).filter(x => x.id !== pendingApplicantId);
  if (selectedApplicantId === pendingApplicantId) selectedApplicantId = null;
  closeApplicantModal();
  saveState();
  render();
  playSound('click');
  showToast(`${a.name} 신청 반려`, 'fail');
  state.log = state.log || [];
  state.log.push({ text: `📛 ${a.name} (T${a.tier}) 신청 반려`, type: 'fail', t: Date.now() });
}

function confirmRent() {
  if (!pendingApplicantId) return;
  const a = (state.applicants || []).find(x => x.id === pendingApplicantId);
  if (!a || selectedSwordLevel < 1) {
    showToast('선택 정보 누락', 'fail');
    closeApplicantModal();
    return;
  }
  if ((state.collection[selectedSwordLevel] || 0) === 0) {
    showToast('검 재고 없음', 'fail');
    closeApplicantModal();
    return;
  }

  const lvl = selectedSwordLevel;
  // Use the dungeon tier the player explicitly picked in the modal. Default
  // = applicant's desiredDungeonTier. Clamped to ≤ desired (no upgrade) and
  // requires the dungeon to be unlocked.
  let tier = (typeof pendingDungeonTier === 'number') ? pendingDungeonTier : a.desiredDungeonTier;
  if (tier < 0) tier = 0;
  if (tier > a.desiredDungeonTier) tier = a.desiredDungeonTier;
  const tierProg = (state.dungeonProgress && state.dungeonProgress[tier]) || { unlocked: tier === 0 };
  if (!tierProg.unlocked) {
    showToast('잠긴 던전 — 파견 불가', 'fail');
    return;
  }
  const cfg = balance.dungeons[tier];
  // Validate floor: must be ≤ bestFloor + 1
  const prog = (state.dungeonProgress && state.dungeonProgress[tier]) || { bestFloor: 0 };
  const maxAvailableFloor = (prog.bestFloor || 0) + 1;
  const floor = Math.max(1, Math.min(maxAvailableFloor, pendingFloor || 1));
  const adjDur = adjustedDuration(lvl, tier, a.tier, floor);
  const adjRate = adjustedSuccessRate(lvl, tier, a.tier);
  const now = Date.now();

  const rental = {
    id: newRentalId(),
    swordLevel: lvl,
    swordTier: getTier(lvl),
    dungeonTier: tier,
    floor: floor,
    heroName: a.name,
    heroTier: a.tier,
    heroStats: a.stats,
    heroPayRate: a.payRate,
    heroGreedy: a.greedy,
    heroMotivation: a.motivation,
    startTime: now,
    endTime: now + adjDur,
    adjustedSuccessRate: adjRate,
    resolved: false,
    outcome: null
  };

  state.collection[lvl] -= 1;
  state.rentals = state.rentals || [];
  state.rentals.push(rental);
  state.applicants = (state.applicants || []).filter(x => x.id !== a.id);
  state.stats.rentalsStarted = (state.stats.rentalsStarted || 0) + 1;
  state.log = state.log || [];
  state.log.push({
    text: `⚔ ${a.name} (T${a.tier}) 이(가) +${lvl} ${SWORD_NAMES[lvl]} 들고 ${cfg.name} ${floorLabel(floor)} 출정!`,
    type: 'info',
    t: now
  });

  closeApplicantModal();
  // Reset selection
  selectedApplicantId = null;
  saveState();
  render();
  playSound('cash');
  showToast(`${a.name} 출정!`, 'success');
}

function selectApplicant(applicantId) {
  // Just highlight & preview the applicant — no modal
  selectedApplicantId = applicantId;
  playSound('click');
  saveState();
  render();
}

// ============================================================
//  HELPERS
// ============================================================
function formatDuration(ms) {
  if (ms < 0) ms = 0;
  if (ms < 60000) return Math.ceil(ms / 1000) + '초';
  if (ms < 3600000) return Math.floor(ms / 60000) + '분 ' + Math.floor((ms % 60000) / 1000) + '초';
  if (ms < 86400000) return Math.floor(ms / 3600000) + '시간 ' + Math.floor((ms % 3600000) / 60000) + '분';
  const days = Math.floor(ms / 86400000);
  const hours = Math.floor((ms % 86400000) / 3600000);
  return days + '일 ' + hours + '시간';
}

let toastTimer = null;
function showToast(text, type = 'info') {
  const t = $('toast');
  t.className = 'toast show ' + type;
  t.textContent = text;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function enterForge(name) {
  if (!switchForge(name)) {
    $('forge-welcome-err').textContent = '대장간 로드 실패';
    return;
  }
  closeForgeWelcome();
  bootRentalPage();
  showToast(`${forge.name} 입장`, 'success');
}
function handleDeleteForgeFromList(name) {
  if (!confirm(`'${name}' 대장간을 삭제할까요?\n해당 진행 상태가 영구 삭제됩니다 (되돌릴 수 없음).`)) return;
  deleteForge(name);
  renderForgeListInModal();
  showToast(`${name} 삭제됨`, 'fail');
}
function handleForgeWelcomeConfirm() {
  const valid = validateForgeName($('forge-welcome-name').value);
  if (!valid) {
    $('forge-welcome-err').textContent = '이름은 1~16자, 공백/제어문자만은 안 됩니다.';
    return;
  }
  if (!createForge(valid)) {
    $('forge-welcome-err').textContent = '대장간 생성 실패';
    return;
  }
  closeForgeWelcome();
  bootRentalPage();
  showToast(`${forge.name} 개점!`, 'success');
}

// ============================================================
//  BOOT
// ============================================================
function bootRentalPage() {
  state = loadState();
  // Resolve any rentals whose timer expired (offline progression)
  const result = resolveRentals();
  if (result.didChange) {
    const succ = result.resolved.filter(r => r.outcome === 'success').length;
    const fail = result.resolved.filter(r => r.outcome === 'fail').length;
    const parts = [];
    if (succ > 0) parts.push(`성공 ${succ}`);
    if (fail > 0) parts.push(`실패 ${fail}`);
    if (parts.length) {
      setTimeout(() => showToast(`귀환 처리: ${parts.join(', ')}`, succ > 0 ? 'success' : 'destroy'), 400);
      try { playSound(succ > 0 ? 'cash' : 'destroy'); } catch (e) {}
    }
  }
  // Generate any new applicants for collection
  const newApps = maybeGenerateApplicants(Date.now());
  // CRITICAL: only save if something actually changed.
  // Unconditional saveState() right after loadState() can overwrite valid saved
  // data with defaults if loadState() ever returned a default fallback (e.g. due
  // to a transient parse error) — creating a self-perpetuating empty-state bug
  // that also breaks sword-enhancement.html on the next visit.
  if (result.didChange || newApps > 0) saveState();
  render();
}

// Wire up clicks
document.addEventListener('click', e => {
  // View-application button: open modal (must check BEFORE card)
  const viewBtn = e.target.closest('.applicant-card .view-btn');
  if (viewBtn && viewBtn.dataset.id) {
    e.stopPropagation();
    showApplicantModal(viewBtn.dataset.id);
    return;
  }
  // Applicant card body: just select + preview, do NOT open modal
  const card = e.target.closest('.applicant-card');
  if (card && card.dataset.id) {
    selectApplicant(card.dataset.id);
    return;
  }
  // Collection cells
  const cell = e.target.closest('.col-cell.clickable');
  if (cell && cell.dataset.level) {
    selectSword(parseInt(cell.dataset.level));
    return;
  }
  // Floor selector inside applicant modal
  const fbtn = e.target.closest('.floor-btn');
  if (fbtn && fbtn.dataset.floor) {
    pendingFloor = parseInt(fbtn.dataset.floor, 10);
    renderApplicantModalContent();
    playSound('click');
    return;
  }
  // Dungeon (tier) selector inside applicant modal
  const dbtn = e.target.closest('.dungeon-btn');
  if (dbtn && dbtn.dataset.dungeonTier && !dbtn.disabled) {
    const newTier = parseInt(dbtn.dataset.dungeonTier, 10);
    pendingDungeonTier = newTier;
    // Reset floor selection to the highest unlocked challenge in the new dungeon
    const dProg = (state.dungeonProgress && state.dungeonProgress[newTier]) || { bestFloor: 0 };
    pendingFloor = (dProg.bestFloor || 0) + 1;
    renderApplicantModalContent();
    playSound('click');
    return;
  }
});

$('applicant-confirm').addEventListener('click', confirmRent);
$('applicant-close').addEventListener('click', closeApplicantModal);
$('applicant-reject').addEventListener('click', rejectApplicant);
$('applicant-modal-bg').addEventListener('click', e => {
  if (e.target === $('applicant-modal-bg')) closeApplicantModal();
});
$('nav-switch-btn').addEventListener('click', () => {
  showForgeWelcome(true);
  playSound('click');
});
$('forge-welcome-confirm').addEventListener('click', handleForgeWelcomeConfirm);
$('forge-welcome-close').addEventListener('click', closeForgeWelcome);
$('forge-welcome-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleForgeWelcomeConfirm();
});
$('forge-list').addEventListener('click', e => {
  const row = e.target.closest('.forge-row');
  if (!row) return;
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'enter') enterForge(row.dataset.name);
  else if (btn.dataset.action === 'delete') handleDeleteForgeFromList(row.dataset.name);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($('applicant-modal-bg').classList.contains('show')) closeApplicantModal();
  }
});

// Resume audio context on first user interaction
document.addEventListener('click', () => { if (state.soundOn) ensureAudio(); }, { once: true });

// Live tick: refresh, generate applicants, resolve rentals
setInterval(() => {
  if ($('forge-welcome-bg').classList.contains('show')) return;
  const now = Date.now();
  const result = resolveRentals();
  const newApps = maybeGenerateApplicants(now);
  if (result.didChange || newApps > 0) saveState();
  if (result.didChange) {
    const succ = result.resolved.filter(r => r.outcome === 'success').length;
    const fail = result.resolved.filter(r => r.outcome === 'fail').length;
    const parts = [];
    if (succ > 0) parts.push(`성공 ${succ}`);
    if (fail > 0) parts.push(`실패 ${fail}`);
    if (parts.length) {
      showToast(`귀환: ${parts.join(', ')}`, succ > 0 ? 'success' : 'destroy');
      try { playSound(succ > 0 ? 'cash' : 'destroy'); } catch (e) {}
    }
  }
  if (newApps > 0) {
    try { playSound('click'); } catch (e) {}
  }
  render();
}, 1000);

// Init
if (forge && forge.name) {
  SAVE_KEY = SAVE_KEY_PREFIX + forge.name;
  bootRentalPage();
} else {
  render();
  showForgeWelcome();
}
</script>
</body>
</html>
