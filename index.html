<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점심공간 — Lunchspace</title>
<link rel="stylesheet" href="shared.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    z-index: 2;
  }
  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 36px;
    color: var(--accent);
    text-shadow: 4px 4px 0 #000, 0 0 24px rgba(255,215,0,0.4);
    margin-bottom: 12px;
    letter-spacing: 4px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .domain {
    font-family: 'Press Start 2P', monospace;
    color: var(--teal);
    font-size: 11px;
    margin-bottom: 40px;
    opacity: 0.7;
  }
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 18px;
    width: 100%;
    max-width: 880px;
  }
  .game-card {
    background: linear-gradient(180deg, var(--panel) 0%, #0a0716 100%);
    border: 3px solid var(--panel-border);
    padding: 22px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05),
                0 0 0 3px var(--bg-dark),
                0 4px 20px rgba(74, 56, 112, 0.4);
  }
  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: inset 0 0 0 1px rgba(255,215,0,0.2),
                0 0 0 3px var(--bg-dark),
                0 8px 30px rgba(255, 215, 0, 0.25);
  }
  .game-card:hover .game-icon { transform: scale(1.1); }
  .game-icon {
    font-size: 48px;
    margin-bottom: 12px;
    transition: transform 0.2s;
    text-align: center;
  }
  .game-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 2px;
  }
  .game-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
  }
  .game-tag {
    display: inline-block;
    margin-top: 12px;
    padding: 3px 10px;
    background: rgba(94, 234, 212, 0.1);
    border: 1px solid var(--teal);
    color: var(--teal);
    font-size: 10px;
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 1px;
  }
  .footer-note {
    margin-top: 50px;
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
    opacity: 0.5;
  }
  .pixel-deco {
    position: absolute;
    pointer-events: none;
    opacity: 0.15;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="logo">LUNCHSPACE</div>
    <div class="subtitle">점심공간 게임 아카이브</div>
    <div class="domain">www.lunchspace.store</div>

    <div class="game-grid">
      <a href="sword-enhancement.html" class="game-card">
        <div class="game-icon">⚔️</div>
        <div class="game-title">검 강화</div>
        <div class="game-desc">대장간에서 검을 두드려 강화하세요. +10이 손익분기점, 그 너머는 도박입니다.</div>
        <div style="text-align:center"><span class="game-tag">FORGE</span></div>
      </a>

      <a href="sword-rental.html" class="game-card">
        <div class="game-icon">🛡️</div>
        <div class="game-title">검 대여소</div>
        <div class="game-desc">강화한 검을 용사들에게 대여해 던전 출정 수익을 챙기세요.</div>
        <div style="text-align:center"><span class="game-tag">RENTAL</span></div>
      </a>

      <a href="sword-dungeon.html" class="game-card">
        <div class="game-icon">🏰</div>
        <div class="game-title">던전</div>
        <div class="game-desc">6단계 티어로 나뉜 던전. 출정 중인 용사들이 보스에 도전합니다.</div>
        <div style="text-align:center"><span class="game-tag">DUNGEON</span></div>
      </a>

      <a href="sword-gallery.html" class="game-card">
        <div class="game-icon">🖼️</div>
        <div class="game-title">갤러리</div>
        <div class="game-desc">수집한 검들의 컬렉션을 감상하세요.</div>
        <div style="text-align:center"><span class="game-tag">GALLERY</span></div>
      </a>
    </div>

    <div class="footer-note">
      Sword Simulator · 검 강화 시뮬레이터 · 2026
    </div>
  </div>
</body>
</html>
